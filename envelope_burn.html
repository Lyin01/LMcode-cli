<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信封燃烧动画</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050302; }
canvas { display: block; margin: 0 auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const W = 1000;
const H = 700;
const ENV_W = 430;          // envelope local width
const ENV_H = 310;          // envelope local height
const ENV_CX = W / 2;       // envelope screen center
const ENV_CY = H / 2 + 15;
const ENV_ANGLE = -0.155;   // ~ -8.9°, counter-clockwise tilt
const BURN_START = 2.0;     // seconds before ignition
const BURN_DURATION = 15.0; // seconds from ignition to fully consumed
const IGN_X = ENV_W - 6;    // ignition point (bottom-right)
const IGN_Y = ENV_H - 6;

// ============================================================
//  CANVAS SETUP
// ============================================================
const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// Offscreen: clean envelope (rendered once)
const envCanvas = document.createElement('canvas');
envCanvas.width = ENV_W;
envCanvas.height = ENV_H;
const envCtx = envCanvas.getContext('2d');

// Offscreen: working burn copy (updated each frame)
const workCanvas = document.createElement('canvas');
workCanvas.width = ENV_W;
workCanvas.height = ENV_H;
const workCtx = workCanvas.getContext('2d');

// Offscreen: pre-rendered desk background (static)
const deskCanvas = document.createElement('canvas');
deskCanvas.width = W;
deskCanvas.height = H;
const deskCtx = deskCanvas.getContext('2d');

// Offscreen: particle scratch pad
const scratch = document.createElement('canvas');
scratch.width = W;
scratch.height = H;
const sctx = scratch.getContext('2d');

// Offscreen: envelope shadow silhouette (rebuilt from burn state each frame)
const shadowCanvas = document.createElement('canvas');
shadowCanvas.width = ENV_W;
shadowCanvas.height = ENV_H;
const shadowCtx = shadowCanvas.getContext('2d');

// ============================================================
//  NOISE (seeded 2D Perlin-style with FBM)
// ============================================================
class Noise {
  constructor(seed = 42) {
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    let s = seed;
    for (let i = 255; i > 0; i--) {
      s = (s * 16807) % 2147483647;
      const j = s % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    this.perm = new Uint8Array(512);
    for (let i = 0; i < 512; i++) this.perm[i] = p[i & 255];
  }

  fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }

  // Perlin gradient: 4 directions (1,1), (-1,1), (1,-1), (-1,-1)
  grad(hash, x, y) {
    const h = hash & 3;
    return ((h & 1) ? -x : x) + ((h & 2) ? -y : y);
  }

  noise2(x, y) {
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const xf = x - Math.floor(x);
    const yf = y - Math.floor(y);
    const u = this.fade(xf);
    const v = this.fade(yf);
    const p = this.perm;

    const aa = p[p[X] + Y];
    const ab = p[p[X] + Y + 1];
    const ba = p[p[X + 1] + Y];
    const bb = p[p[X + 1] + Y + 1];

    return this.lerp(
      this.lerp(this.grad(aa, xf, yf),       this.grad(ba, xf - 1, yf),     u),
      this.lerp(this.grad(ab, xf, yf - 1),   this.grad(bb, xf - 1, yf - 1), u),
      v
    );
  }

  lerp(a, b, t) { return a + t * (b - a); }

  fbm(x, y, octaves = 4) {
    let v = 0, amp = 1, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
      v += amp * this.noise2(x * freq, y * freq);
      max += amp;
      amp *= 0.5;
      freq *= 2.1;
    }
    return v / max;
  }
}

const noise = new Noise(137);

// Pre-computed noise texture (256×256) for fast bilinear lookups
const NT = 256;
const noiseTex = new Float32Array(NT * NT);
for (let y = 0; y < NT; y++)
  for (let x = 0; x < NT; x++)
    noiseTex[y * NT + x] = noise.fbm(x * 0.05, y * 0.05, 4);

function sampleNT(px, py, scale) {
  let sx = ((px * scale) % NT + NT) % NT;
  let sy = ((py * scale) % NT + NT) % NT;
  const ix = Math.floor(sx), iy = Math.floor(sy);
  const fx = sx - ix, fy = sy - iy;
  const ix1 = (ix + 1) & (NT - 1), iy1 = (iy + 1) & (NT - 1);
  const v00 = noiseTex[iy * NT + ix], v10 = noiseTex[iy * NT + ix1];
  const v01 = noiseTex[iy1 * NT + ix], v11 = noiseTex[iy1 * NT + ix1];
  return v00 + fx * (v10 - v00) + fy * (v01 - v00) + fx * fy * (v00 - v10 - v01 + v11);
}

// ============================================================
//  PRE-COMPUTED BURN-TIME MAP
// ============================================================
// burnTimeMap[px] ∈ [0,1]: when each pixel catches fire
const burnTimeMap = new Float32Array(ENV_W * ENV_H);
const maxDist = Math.sqrt(IGN_X * IGN_X + IGN_Y * IGN_Y);

function buildBurnTimeMap() {
  for (let y = 0; y < ENV_H; y++) {
    for (let x = 0; x < ENV_W; x++) {
      const dx = x - IGN_X, dy = y - IGN_Y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Multi-scale noise gives highly irregular burn edges
      const n1 = noise.fbm(x * 0.012, y * 0.012, 3) * 1.0;
      const n2 = noise.fbm(x * 0.035 + 55, y * 0.035 + 77, 2) * 0.5;
      const n3 = noise.fbm(x * 0.08 + 123, y * 0.08 + 211, 1) * 0.25;
      const n = n1 + n2 + n3;

      // Edge proximity bias: pixels near paper edge burn slightly sooner
      const ebX = Math.min(x, ENV_W - x) / 25;
      const ebY = Math.min(y, ENV_H - y) / 25;
      const edgeBoost = (1 - Math.min(1, Math.min(ebX, ebY))) * 0.08;

      // Non-linear distance: slight acceleration (fire spreads faster over time)
      const norm = dist / maxDist;
      const accelerated = Math.pow(norm, 0.85);

      burnTimeMap[y * ENV_W + x] = Math.max(0, Math.min(1,
        accelerated + n * 0.12 - edgeBoost
      ));
    }
  }
}

// ============================================================
//  COORDINATE TRANSFORMS
// ============================================================
const cosA = Math.cos(ENV_ANGLE), sinA = Math.sin(ENV_ANGLE);

function localToScreen(lx, ly) {
  const rx = lx - ENV_W / 2, ry = ly - ENV_H / 2;
  return { x: ENV_CX + rx * cosA - ry * sinA, y: ENV_CY + rx * sinA + ry * cosA };
}

// ============================================================
//  GLOW SPRITES (pre-rendered radial gradients)
// ============================================================
function makeGlow(r, g, b, radius) {
  const c = document.createElement('canvas');
  const d = radius * 2;
  c.width = d; c.height = d;
  const cx = c.getContext('2d');
  const grad = cx.createRadialGradient(radius, radius, 0, radius, radius, radius);
  grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
  grad.addColorStop(0.1, `rgba(${r},${g},${b},0.9)`);
  grad.addColorStop(0.3, `rgba(${r},${g},${b},0.55)`);
  grad.addColorStop(0.6, `rgba(${r},${g},${b},0.12)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  cx.fillStyle = grad;
  cx.fillRect(0, 0, d, d);
  return c;
}

const glowCore  = makeGlow(255, 255, 220, 30);  // white-yellow core
const glowMid   = makeGlow(255, 155, 30, 42);   // orange mid
const glowTip   = makeGlow(220, 50, 15, 50);    // deep red tip
const glowEmber = makeGlow(255, 185, 55, 14);
const glowSmoke = makeGlow(48, 44, 39, 60);

// ============================================================
//  DRAW ENVELOPE (one-time, clean state)
// ============================================================
function drawEnvelope() {
  const cx = envCtx;
  const w = ENV_W, h = ENV_H;
  const pad = 5;
  const cr = 5; // corner radius

  cx.clearRect(0, 0, w, h);

  // Envelope body rounded-rect path
  function envelopePath() {
    cx.beginPath();
    cx.moveTo(pad + cr, pad);
    cx.lineTo(w - pad - cr, pad);
    cx.quadraticCurveTo(w - pad, pad, w - pad, pad + cr);
    cx.lineTo(w - pad, h - pad - cr);
    cx.quadraticCurveTo(w - pad, h - pad, w - pad - cr, h - pad);
    cx.lineTo(pad + cr, h - pad);
    cx.quadraticCurveTo(pad, h - pad, pad, h - pad - cr);
    cx.lineTo(pad, pad + cr);
    cx.quadraticCurveTo(pad, pad, pad + cr, pad);
    cx.closePath();
  }

  // Base paper fill
  envelopePath();
  const paperGrad = cx.createLinearGradient(20, 20, w - 20, h - 20);
  paperGrad.addColorStop(0, '#d9ccb0');
  paperGrad.addColorStop(0.25, '#ddcfb5');
  paperGrad.addColorStop(0.5, '#d6c6a6');
  paperGrad.addColorStop(0.75, '#d0be9c');
  paperGrad.addColorStop(1, '#cbb792');
  cx.fillStyle = paperGrad;
  cx.fill();

  // Paper grain & aging (per-pixel, clipped to envelope body)
  cx.save();
  envelopePath();
  cx.clip();

  const grain = cx.createImageData(w, h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const gn = sampleNT(x * 0.9 + 3, y * 0.9 + 7, 0.04);
      // Edge darkening (age)
      const ex = Math.min(x, w - x) / 35;
      const ey = Math.min(y, h - y) / 35;
      const edge = 1 - Math.min(1, Math.min(ex, ey));
      // Age spots
      const spotN = sampleNT(x * 0.2 + 19, y * 0.2 + 23, 0.025);
      const spot = spotN > 0.58 ? (spotN - 0.58) * 50 : 0;
      // Corner fold triangles (slightly darker)
      const corners = [
        [pad, pad, 1, 1],
        [w - pad, pad, -1, 1],
        [pad, h - pad, 1, -1],
        [w - pad, h - pad, -1, -1]
      ];
      let fold = 0;
      for (const [cx0, cy0, sx, sy] of corners) {
        const fx = (x - cx0) * sx, fy = (y - cy0) * sy;
        if (fx >= 0 && fy >= 0 && fx + fy < 26)
          fold = Math.max(fold, (1 - (fx + fy) / 26) * 28);
      }

      const rv = 215 + (gn - 0.5) * 16 - edge * 38 - spot - fold;
      const gv = 200 + (gn - 0.5) * 14 - edge * 33 - spot * 0.8 - fold * 0.85;
      const bv = 170 + (gn - 0.5) * 12 - edge * 28 - spot * 0.6 - fold * 0.7;
      grain.data[i]   = Math.max(0, Math.min(255, rv));
      grain.data[i+1] = Math.max(0, Math.min(255, gv));
      grain.data[i+2] = Math.max(0, Math.min(255, bv));
      grain.data[i+3] = 255;
    }
  }
  cx.putImageData(grain, 0, 0);
  cx.restore();

  // --- Fold crease lines ---
  cx.strokeStyle = 'rgba(150,130,100,0.28)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(pad + 8, pad + 8);
  cx.lineTo(w / 2, h * 0.33);
  cx.lineTo(w - pad - 8, pad + 8);
  cx.stroke();

  cx.beginPath();
  cx.moveTo(pad + 8, h - pad - 8);
  cx.lineTo(w / 2, h * 0.67);
  cx.lineTo(w - pad - 8, h - pad - 8);
  cx.stroke();

  cx.strokeStyle = 'rgba(140,120,90,0.18)';
  cx.lineWidth = 0.6;
  cx.beginPath();
  cx.moveTo(w * 0.16, pad + 12);
  cx.lineTo(w * 0.16, h - pad - 12);
  cx.moveTo(w * 0.84, pad + 12);
  cx.lineTo(w * 0.84, h - pad - 12);
  cx.stroke();

  // --- Wax seal ---
  const sx = w / 2, sy = h * 0.33, sr = 23;
  cx.beginPath();
  cx.arc(sx + 2, sy + 2, sr, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(0,0,0,0.12)';
  cx.fill();

  const sealGrad = cx.createRadialGradient(sx - 6, sy - 6, 2, sx + 1, sy + 1, sr);
  sealGrad.addColorStop(0, '#d9444f');
  sealGrad.addColorStop(0.35, '#c02938');
  sealGrad.addColorStop(0.7, '#9a1525');
  sealGrad.addColorStop(1, '#6e0d18');
  cx.beginPath();
  cx.arc(sx, sy, sr, 0, Math.PI * 2);
  cx.fillStyle = sealGrad;
  cx.fill();

  // Seal texture via pixel manipulation
  const sealTex = document.createElement('canvas');
  sealTex.width = sr * 2 + 6; sealTex.height = sr * 2 + 6;
  const stx = sealTex.getContext('2d');
  const sdat = stx.createImageData(sr * 2 + 6, sr * 2 + 6);
  for (let y = 0; y < sr * 2 + 6; y++) {
    for (let x = 0; x < sr * 2 + 6; x++) {
      const ii = (y * (sr * 2 + 6) + x) * 4;
      const dx0 = x - sr - 3, dy0 = y - sr - 3;
      if (Math.sqrt(dx0 * dx0 + dy0 * dy0) < sr) {
        const nseal = sampleNT(x * 0.55 + 50, y * 0.55 + 50, 0.07);
        const crack = sampleNT(x * 0.18 + 100, y * 0.18 + 100, 0.05) > 0.6 ? 45 : 0;
        sdat.data[ii]   = Math.max(0, Math.min(255, 190 + (nseal - 0.5) * 28 - crack));
        sdat.data[ii+1] = Math.max(0, Math.min(255, 40 + (nseal - 0.5) * 12 - crack * 0.5));
        sdat.data[ii+2] = Math.max(0, Math.min(255, 30 + (nseal - 0.5) * 8 - crack * 0.3));
        sdat.data[ii+3] = 200;
      }
    }
  }
  stx.putImageData(sdat, 0, 0);
  cx.drawImage(sealTex, sx - sr - 3, sy - sr - 3);

  // Highlight
  const hlG = cx.createRadialGradient(sx - 8, sy - 8, 1, sx - 3, sy - 3, sr * 0.45);
  hlG.addColorStop(0, 'rgba(255,210,210,0.45)');
  hlG.addColorStop(1, 'rgba(255,200,200,0)');
  cx.beginPath();
  cx.arc(sx, sy, sr, 0, Math.PI * 2);
  cx.fillStyle = hlG;
  cx.fill();

  cx.beginPath();
  cx.arc(sx, sy, sr - 2, 0, Math.PI * 2);
  cx.strokeStyle = 'rgba(50,8,8,0.35)';
  cx.lineWidth = 0.9;
  cx.stroke();

  // --- Address ---
  cx.textAlign = 'left';
  cx.textBaseline = 'top';
  const tx = w * 0.41, ty = h * 0.52;
  cx.shadowColor = 'rgba(0,0,0,0.06)';
  cx.shadowBlur = 1;
  cx.font = 'italic 21px "Palatino Linotype", "Georgia", "Times New Roman", serif';
  cx.fillStyle = '#342c20';
  cx.fillText('Mr. John Smith', tx, ty);
  cx.font = 'italic 18px "Palatino Linotype", "Georgia", "Times New Roman", serif';
  cx.fillText('47 Maple Avenue', tx, ty + 34);
  cx.fillText('London, W1D 3AF', tx, ty + 60);
  cx.font = 'italic 16px "Palatino Linotype", "Georgia", "Times New Roman", serif';
  cx.fillStyle = '#554a3b';
  cx.fillText('United Kingdom', tx, ty + 88);
  cx.shadowBlur = 0;

  cx.strokeStyle = 'rgba(80,65,45,0.22)';
  cx.lineWidth = 0.6;
  cx.beginPath();
  cx.moveTo(tx, ty - 10);
  cx.lineTo(tx + 90, ty - 10);
  cx.stroke();

  // --- Stamp area ---
  const stampX = w - pad - 42, stampY = pad + 14;
  cx.fillStyle = '#dbccb2';
  cx.fillRect(stampX, stampY, 36, 44);
  cx.strokeStyle = 'rgba(140,110,80,0.28)';
  cx.lineWidth = 0.6;
  cx.strokeRect(stampX, stampY, 36, 44);
  cx.strokeRect(stampX + 4, stampY + 4, 28, 36);
  cx.font = '8px serif';
  cx.fillStyle = 'rgba(70,50,30,0.3)';
  cx.textAlign = 'center';
  cx.fillText('POSTAGE', stampX + 18, stampY + 22);
  cx.textAlign = 'start';

  // --- Age stains ---
  for (let i = 0; i < 6; i++) {
    const ax = 12 + Math.random() * (w - 24), ay = 12 + Math.random() * (h - 24);
    cx.beginPath();
    cx.arc(ax, ay, 2 + Math.random() * 8, 0, Math.PI * 2);
    cx.fillStyle = `rgba(150,130,105,${0.025 + Math.random() * 0.035})`;
    cx.fill();
  }
}

// ============================================================
//  DRAW DESK BACKGROUND (pre-rendered once)
// ============================================================
function drawDeskOnce() {
  const dc = deskCtx;

  // Dark wood base gradient
  const g = dc.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#2c221a');
  g.addColorStop(0.3, '#1f1710');
  g.addColorStop(0.6, '#261d14');
  g.addColorStop(1, '#19120c');
  dc.fillStyle = g;
  dc.fillRect(0, 0, W, H);

  // Wood grain as semi-transparent overlay
  const grainCanvas = document.createElement('canvas');
  grainCanvas.width = W; grainCanvas.height = H;
  const gctx = grainCanvas.getContext('2d');
  const gd = gctx.createImageData(W, H);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const g1 = sampleNT(x * 0.007, y * 0.06, 0.03);
      const g2 = sampleNT(x * 0.014 + 100, y * 0.09 + 40, 0.045);
      const grain = g1 * 0.6 + g2 * 0.4;
      const dark = (grain - 0.5) * 28;
      gd.data[i]   = Math.max(0, Math.min(255, 32 + dark));
      gd.data[i+1] = Math.max(0, Math.min(255, 23 + dark));
      gd.data[i+2] = Math.max(0, Math.min(255, 17 + dark));
      gd.data[i+3] = 255;
    }
  }
  gctx.putImageData(gd, 0, 0);
  dc.drawImage(grainCanvas, 0, 0);
}

// ============================================================
//  PROCESS BURN (per-frame pixel manipulation)
// ============================================================
let burnBuf = null;
let refBufData = null;

function processBurn(elapsed) {
  const raw = (elapsed - BURN_START) / BURN_DURATION;
  const bp = Math.max(0, Math.min(1, raw));

  // Capture reference envelope data lazily (once)
  if (!refBufData) {
    refBufData = envCtx.getImageData(0, 0, ENV_W, ENV_H).data;
  }

  // Prepare working buffer
  if (!burnBuf || burnBuf.width !== ENV_W || burnBuf.height !== ENV_H) {
    burnBuf = workCtx.createImageData(ENV_W, ENV_H);
  }

  const dst = burnBuf.data;
  const src = refBufData;

  // No burning yet — copy original
  if (bp <= 0) {
    dst.set(src);
    workCtx.putImageData(burnBuf, 0, 0);
    return bp;
  }

  // Fully consumed
  if (bp >= 1) {
    for (let y = 0; y < ENV_H; y++) {
      for (let x = 0; x < ENV_W; x++) {
        const i = (y * ENV_W + x) * 4;
        dst[i] = dst[i+1] = dst[i+2] = dst[i+3] = 0;
      }
    }
    workCtx.putImageData(burnBuf, 0, 0);
    return bp;
  }

  for (let y = 0; y < ENV_H; y++) {
    for (let x = 0; x < ENV_W; x++) {
      const i = (y * ENV_W + x) * 4;
      if (src[i + 3] < 10) { dst[i + 3] = 0; continue; }

      const bt = burnTimeMap[y * ENV_W + x];

      // Stage durations per pixel (in bp units):
      // warming+glow   0 → 0.015
      // toasting       0.015 → 0.055
      // browning       0.055 → 0.13
      // charring       0.13 → 0.22
      // consumed       > 0.22

      if (bp > bt + 0.22) {
        // --- Consumed: fully transparent, reveal desk ---
        dst[i] = dst[i+1] = dst[i+2] = dst[i+3] = 0;

      } else if (bp > bt + 0.13) {
        // --- Charring: black carbon, slight warm glow at leading edge ---
        const t = (bp - bt - 0.13) / 0.09;
        const ct = Math.max(0, Math.min(1, t));
        const glow = (1 - ct) * 0.28;
        dst[i]   = Math.floor(5  + glow * 75);
        dst[i+1] = Math.floor(3  + glow * 20);
        dst[i+2] = Math.floor(2  + glow * 10);
        dst[i+3] = 255;

      } else if (bp > bt + 0.055) {
        // --- Browning: dark toasted brown ---
        const t = (bp - bt - 0.055) / 0.075;
        const br = Math.max(0, Math.min(1, t));
        const origR = src[i], origG = src[i+1], origB = src[i+2];
        dst[i]   = Math.floor(origR + (52  - origR) * br);
        dst[i+1] = Math.floor(origG + (28  - origG) * br);
        dst[i+2] = Math.floor(origB + (10  - origB) * br);
        dst[i+3] = 255;

      } else if (bp > bt + 0.015) {
        // --- Toasting: gentle darkening ---
        const t = (bp - bt - 0.015) / 0.04;
        const tk = Math.max(0, Math.min(1, t));
        const origR = src[i], origG = src[i+1], origB = src[i+2];
        dst[i]   = Math.floor(origR + (100 - origR) * tk * 0.5);
        dst[i+1] = Math.floor(origG + (60  - origG) * tk * 0.5);
        dst[i+2] = Math.floor(origB + (25  - origB) * tk * 0.5);
        dst[i+3] = 255;

      } else if (bp > bt) {
        // --- Glowing edge: fire directly illuminates the burn front ---
        const t = (bp - bt) / 0.015;
        const et = Math.max(0, Math.min(1, t));
        const origR = src[i], origG = src[i+1], origB = src[i+2];
        dst[i]   = Math.min(255, origR + Math.floor(et * 170));
        dst[i+1] = Math.min(255, origG + Math.floor(et * 85));
        dst[i+2] = Math.min(255, origB + Math.floor(et * 25));
        dst[i+3] = 255;

      } else {
        // --- Unaffected ---
        dst[i] = src[i]; dst[i+1] = src[i+1]; dst[i+2] = src[i+2]; dst[i+3] = src[i+3];
      }
    }
  }

  workCtx.putImageData(burnBuf, 0, 0);
  return bp;
}

// ============================================================
//  FIRE PARTICLES
// ============================================================
let fireParts = [];

class FireP {
  constructor(x, y, tier) {
    this.x = x; this.y = y; this.tier = tier;
    this.age = 0;
    switch (tier) {
      case 0: // white-yellow core
        this.life = 0.15 + Math.random() * 0.3;
        this.size = 2 + Math.random() * 3.5;
        this.vy = -(28 + Math.random() * 38);
        this.vx = (Math.random() - 0.5) * 16;
        break;
      case 1: // orange mid
        this.life = 0.3 + Math.random() * 0.5;
        this.size = 3.5 + Math.random() * 6;
        this.vy = -(32 + Math.random() * 42);
        this.vx = (Math.random() - 0.5) * 22;
        break;
      case 2: // red tip
        this.life = 0.45 + Math.random() * 0.8;
        this.size = 6 + Math.random() * 11;
        this.vy = -(38 + Math.random() * 48);
        this.vx = (Math.random() - 0.5) * 28;
        break;
    }
    this.initSize = this.size;
  }

  update(dt) {
    this.age += dt;
    const lf = this.age / this.life;
    // Buoyancy deceleration
    this.vy += 20 * dt;
    // Lateral turbulence
    this.vx += (Math.random() - 0.5) * 75 * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // Size: rapid growth then gradual shrink
    if (lf < 0.12) {
      this.size = this.initSize * (1 + lf * 2.5);
    } else {
      this.size = this.initSize * (1.3 - (lf - 0.12) * 1.3 / 0.88);
    }
    this.size = Math.max(0.2, this.size);
    return lf < 1;
  }

  draw(sc) {
    const lf = Math.max(0, this.age / this.life);
    const alpha = Math.max(0, (1 - lf) * (1 - lf * 0.2));
    if (alpha <= 0 || this.size < 0.2) return;
    sc.globalAlpha = alpha;
    const spr = this.tier === 0 ? glowCore : this.tier === 1 ? glowMid : glowTip;
    const s = this.size * 2;
    sc.drawImage(spr, this.x - s / 2, this.y - s / 2, s, s);
  }
}

function spawnFire(bp) {
  if (bp <= 0) return;
  const total = Math.floor(22 + bp * 55);
  const frontDist = bp * maxDist;
  for (let i = 0; i < total; i++) {
    const off = (Math.random() - 0.5) * 45;
    const d = frontDist + off;
    const angle = Math.random() * Math.PI * 0.55;
    const lx = IGN_X - d * Math.cos(angle);
    const ly = IGN_Y - d * Math.sin(angle);
    if (lx < 0 || lx > ENV_W || ly < 0 || ly > ENV_H) continue;
    const sp = localToScreen(lx, ly);
    const px = sp.x + (Math.random() - 0.5) * 14;
    const py = sp.y + (Math.random() - 0.5) * 12;
    const r = Math.random();
    const tier = r < 0.25 ? 0 : r < 0.6 ? 1 : 2;
    fireParts.push(new FireP(px, py, tier));
  }
}

// ============================================================
//  EMBERS
// ============================================================
let embers = [];

class Ember {
  constructor(x, y) {
    this.x = x; this.y = y; this.age = 0;
    this.life = 0.7 + Math.random() * 1.8;
    this.size = 1 + Math.random() * 2.8;
    this.vy = -(8 + Math.random() * 48);
    this.vx = (Math.random() - 0.5) * 30;
    this.initSize = this.size;
  }

  update(dt) {
    this.age += dt;
    const lf = this.age / this.life;
    // Hot turbulent updraft
    this.vx += (Math.random() - 0.5) * 95 * dt;
    this.vy += (10 - lf * 14) * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.size = this.initSize * Math.max(0.12, 1 - lf * 0.88);
    return lf < 1 && this.size > 0.08;
  }

  draw(sc) {
    const lf = this.age / this.life;
    const alpha = Math.max(0, (1 - lf) * (1 - lf * 0.25));
    if (alpha <= 0 || this.size < 0.08) return;
    sc.globalAlpha = alpha;
    const s = this.size * 2.2;
    sc.drawImage(glowEmber, this.x - s / 2, this.y - s / 2, s, s);
    // Bright center for young embers
    if (lf < 0.35) {
      sc.globalAlpha = alpha * 0.7;
      const r2 = 255, g2 = Math.floor(195 - lf * 210), b2 = Math.floor(75 - lf * 105);
      sc.fillStyle = `rgb(${r2},${Math.max(0,g2)},${Math.max(0,b2)})`;
      sc.beginPath();
      sc.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
      sc.fill();
    }
  }
}

function spawnEmbers(bp) {
  if (bp <= 0) return;
  const total = Math.floor(5 + bp * 22);
  const frontDist = bp * maxDist;
  for (let i = 0; i < total; i++) {
    const d = frontDist + (Math.random() - 0.5) * 40;
    const angle = Math.random() * Math.PI * 0.6;
    const lx = IGN_X - d * Math.cos(angle);
    const ly = IGN_Y - d * Math.sin(angle);
    if (lx < 0 || lx > ENV_W || ly < 0 || ly > ENV_H) continue;
    const sp = localToScreen(lx, ly);
    embers.push(new Ember(sp.x + (Math.random() - 0.5) * 10, sp.y + (Math.random() - 0.5) * 10));
  }
}

// ============================================================
//  SMOKE
// ============================================================
let smokes = [];

class SmokeP {
  constructor(x, y) {
    this.x = x; this.y = y; this.age = 0;
    this.life = 1.6 + Math.random() * 2.8;
    this.size = 10 + Math.random() * 28;
    this.initSize = this.size;
    this.vy = -(5 + Math.random() * 18);
    this.vx = (Math.random() - 0.5) * 12;
    this.baseAlpha = 0.04 + Math.random() * 0.07;
  }

  update(dt) {
    this.age += dt;
    const lf = this.age / this.life;
    this.vx += (Math.random() - 0.5) * 35 * dt;
    this.vy -= 2 * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.size = this.initSize * (1 + lf * 1.8);
    return lf < 1;
  }

  draw(sc) {
    const lf = this.age / this.life;
    const alpha = this.baseAlpha * (1 - lf) * (1 - lf * 0.4);
    if (alpha <= 0) return;
    sc.globalAlpha = alpha;
    const s = this.size * 2;
    sc.drawImage(glowSmoke, this.x - s / 2, this.y - s / 2, s, s);
  }
}

function spawnSmoke(bp) {
  if (bp <= 0) return;
  const total = Math.floor(1 + bp * 3);
  const frontDist = bp * maxDist;
  for (let i = 0; i < total; i++) {
    const d = frontDist + (Math.random() - 0.5) * 60;
    const angle = Math.random() * Math.PI * 0.55;
    const lx = IGN_X - d * Math.cos(angle);
    const ly = IGN_Y - d * Math.sin(angle);
    if (lx < 0 || lx > ENV_W || ly < 0 || ly > ENV_H) continue;
    const sp = localToScreen(lx, ly);
    smokes.push(new SmokeP(sp.x + (Math.random() - 0.5) * 25, sp.y + (Math.random() - 0.5) * 18));
  }
}

// ============================================================
//  ASH REMAINS (post-burn fragments on desk)
// ============================================================
let ashes = [];

class AshFrag {
  constructor(x, y) {
    this.x = x; this.y = y; this.age = 0;
    this.life = 4 + Math.random() * 5;
    this.size = 1.2 + Math.random() * 2.4;
    this.glow = 0.3 + Math.random() * 0.45;  // warm ember heat, cools over time
    this.rot = Math.random() * Math.PI;
    this.settle = 0.5 + Math.random() * 1.0;  // tiny initial drop, then rests
  }

  update(dt) {
    this.age += dt;
    this.glow = Math.max(0, this.glow - dt * 0.16);  // slowly darkens
    this.y += this.settle * dt;
    this.settle *= Math.max(0, 1 - dt * 2.5);
    return this.age < this.life;
  }

  draw(sc) {
    const lf = this.age / this.life;
    // Charcoal flake body — a small dark fleck of burnt paper.
    const flakeA = Math.max(0, 0.5 * (1 - lf));
    if (flakeA > 0.01) {
      sc.globalAlpha = flakeA;
      sc.fillStyle = '#161210';
      sc.beginPath();
      sc.ellipse(this.x, this.y, this.size, this.size * 0.68, this.rot, 0, Math.PI * 2);
      sc.fill();
    }
    // Warm ember core, only while still hot.
    if (this.glow > 0.02) {
      const r = this.size * 2.2;
      const g = sc.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
      const cr = Math.floor(150 + this.glow * 105);
      const cg = Math.floor(45 + this.glow * 70);
      const cb = Math.floor(18 + this.glow * 14);
      g.addColorStop(0, `rgba(${cr},${cg},${cb},${this.glow * 0.85})`);
      g.addColorStop(0.5, `rgba(${Math.floor(cr * 0.7)},${Math.floor(cg * 0.5)},${cb},${this.glow * 0.3})`);
      g.addColorStop(1, 'rgba(50,18,8,0)');
      sc.globalAlpha = 1;
      sc.fillStyle = g;
      sc.beginPath();
      sc.arc(this.x, this.y, r, 0, Math.PI * 2);
      sc.fill();
    }
  }
}

// Deposit a *few* ash flakes in the just-consumed region behind the burn
// front, so they accumulate along the trail rather than blanketing the whole
// footprint like a starfield. Hard cap keeps it "a few glowing fragments".
const ASH_MAX = 26;
function spawnAsh(bp) {
  if (ashes.length >= ASH_MAX || Math.random() > 0.5) return;
  const frontDist = bp * maxDist;
  const total = 1 + Math.floor(Math.random() * 2);
  for (let i = 0; i < total && ashes.length < ASH_MAX; i++) {
    const d = frontDist * (0.12 + Math.random() * 0.82); // behind the front
    const angle = Math.random() * Math.PI * 0.55;
    const lx = IGN_X - d * Math.cos(angle);
    const ly = IGN_Y - d * Math.sin(angle);
    if (lx < 0 || lx > ENV_W || ly < 0 || ly > ENV_H) continue;
    const sp = localToScreen(lx + (Math.random() - 0.5) * 8, ly + (Math.random() - 0.5) * 8);
    ashes.push(new AshFrag(sp.x, sp.y));
  }
}

// ============================================================
//  DESK LIGHTING (moves with burn front)
// ============================================================
function drawDeskLight(bp, elapsed, fIntensity) {
  if (bp <= 0 || fIntensity < 0.01) return;

  // Light center tracks the burn front, not the fixed ignition point
  const frontDist = bp * maxDist;
  // Weighted center of the burn front (sweeps from bottom-right toward top-left)
  const avgAngle = Math.PI * 0.25; // ~45°, sweep toward center
  const clx = IGN_X - frontDist * Math.cos(avgAngle) * 0.6;
  const cly = IGN_Y - frontDist * Math.sin(avgAngle) * 0.6;
  const fc = localToScreen(clx, cly);

  const flicker = 0.65 + 0.35 * Math.sin(elapsed * 16.5 + sampleNT(elapsed * 2.5, 0, 0.08) * 3);
  const intensity = fIntensity * flicker;
  if (intensity < 0.01) return;

  // Primary glow
  const r1 = 100 + bp * 160 + flicker * 45;
  const grad1 = ctx.createRadialGradient(fc.x, fc.y, 8, fc.x, fc.y, r1);
  grad1.addColorStop(0, `rgba(255,155,45,${intensity * 0.28})`);
  grad1.addColorStop(0.18, `rgba(255,120,28,${intensity * 0.14})`);
  grad1.addColorStop(0.45, `rgba(210,80,15,${intensity * 0.06})`);
  grad1.addColorStop(1, 'rgba(180,50,10,0)');
  ctx.fillStyle = grad1;
  ctx.fillRect(fc.x - r1, fc.y - r1 * 0.8, r1 * 2, r1 * 1.6);

  // Wider ambient
  const r2 = r1 * 2.2;
  const grad2 = ctx.createRadialGradient(fc.x, fc.y, 0, fc.x, fc.y, r2);
  grad2.addColorStop(0, `rgba(170,85,25,${intensity * 0.05})`);
  grad2.addColorStop(1, 'rgba(150,60,15,0)');
  ctx.fillStyle = grad2;
  ctx.fillRect(fc.x - r2, fc.y - r2, r2 * 2, r2 * 2);
}

// ============================================================
//  MAIN LOOP
// ============================================================
let elapsed = 0;
let lastT = 0;

function update(dt) {
  elapsed += dt;
  const bp = processBurn(elapsed);

  let fi = 0;
  if (bp > 0 && bp < 1) {
    fi = Math.sin(bp * Math.PI) * (1 - bp * 0.25);
    fi = Math.max(0, fi);
  }

  if (bp > 0 && bp < 1) {
    spawnFire(bp);
    spawnEmbers(bp);
    spawnSmoke(bp);
  }
  if (bp > 0.05 && bp < 1) spawnAsh(bp);

  fireParts = fireParts.filter(p => p.update(dt));
  embers = embers.filter(e => e.update(dt));
  smokes = smokes.filter(s => s.update(dt));
  ashes = ashes.filter(a => a.update(dt));

  // Cap counts for performance
  if (fireParts.length > 600) fireParts.splice(0, fireParts.length - 600);
  if (embers.length > 250)   embers.splice(0, embers.length - 250);
  if (smokes.length > 120)   smokes.splice(0, smokes.length - 120);
  if (ashes.length > ASH_MAX) ashes.splice(0, ashes.length - ASH_MAX);

  return { bp, fi };
}

// Black silhouette of the *remaining* (non-consumed) envelope, drawn as a
// soft shadow so it shrinks with the burn instead of leaving a ghost rectangle.
function drawEnvelopeShadow() {
  shadowCtx.clearRect(0, 0, ENV_W, ENV_H);
  shadowCtx.globalCompositeOperation = 'source-over';
  shadowCtx.drawImage(workCanvas, 0, 0);
  shadowCtx.globalCompositeOperation = 'source-in';
  shadowCtx.fillStyle = '#000';
  shadowCtx.fillRect(0, 0, ENV_W, ENV_H);
  shadowCtx.globalCompositeOperation = 'source-over';

  ctx.save();
  ctx.translate(ENV_CX + 5, ENV_CY + 7);
  ctx.rotate(ENV_ANGLE);
  ctx.translate(-ENV_W / 2, -ENV_H / 2);
  ctx.globalAlpha = 0.22;
  ctx.shadowColor = 'rgba(0,0,0,0.32)';
  ctx.shadowBlur = 13;
  ctx.drawImage(shadowCanvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// Soft scorch/soot residue on the desk. Drawn before the envelope, so it is
// only visible through the burned-away (transparent) regions — and it lingers
// after the paper is gone, giving the final frame a believable burn mark.
function drawScorch(bp) {
  if (bp <= 0.08) return;
  const scorch = Math.min(0.32, (bp - 0.08) * 0.55);
  ctx.save();
  ctx.translate(ENV_CX, ENV_CY);
  ctx.rotate(ENV_ANGLE);
  const sg = ctx.createRadialGradient(0, 0, 10, 0, 0, ENV_W * 0.5);
  sg.addColorStop(0, `rgba(14,9,7,${scorch})`);
  sg.addColorStop(0.6, `rgba(20,13,9,${scorch * 0.55})`);
  sg.addColorStop(1, 'rgba(20,13,9,0)');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.ellipse(0, 0, ENV_W * 0.5, ENV_H * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function render(bp, fi) {
  // Copy pre-rendered desk
  ctx.drawImage(deskCanvas, 0, 0);

  // Desk light (behind envelope)
  drawDeskLight(bp, elapsed, fi);

  // Scorch residue (shows through burned-away areas, lingers at the end)
  drawScorch(bp);

  // ---- Envelope shadow (tracks remaining paper) ----
  drawEnvelopeShadow();

  // ---- Envelope (with burn) ----
  ctx.save();
  ctx.translate(ENV_CX, ENV_CY);
  ctx.rotate(ENV_ANGLE);
  ctx.translate(-ENV_W / 2, -ENV_H / 2);
  ctx.drawImage(workCanvas, 0, 0);
  ctx.restore();

  // ---- Particles ----
  sctx.clearRect(0, 0, W, H);

  // Smoke behind fire
  for (const s of smokes) s.draw(sctx);

  // Fire: tips first (larger, behind), mid, then cores (brightest, on top)
  sctx.globalCompositeOperation = 'lighter';
  for (const p of fireParts) if (p.tier === 2) p.draw(sctx);
  for (const p of fireParts) if (p.tier === 1) p.draw(sctx);
  for (const p of fireParts) if (p.tier === 0) p.draw(sctx);
  sctx.globalCompositeOperation = 'source-over';

  // Embers
  for (const e of embers) e.draw(sctx);

  // Ash fragments on desk
  for (const a of ashes) a.draw(sctx);

  ctx.drawImage(scratch, 0, 0);

  // ---- Extra fire glow on/near the envelope surface ----
  if (bp > 0 && bp < 1) {
    const frontDist = bp * maxDist;
    const clx = IGN_X - frontDist * Math.cos(Math.PI * 0.25) * 0.6;
    const cly = IGN_Y - frontDist * Math.sin(Math.PI * 0.25) * 0.6;
    const fc2 = localToScreen(clx, cly);
    const flicker = 0.65 + 0.35 * Math.sin(elapsed * 16.5 + sampleNT(elapsed * 2.5, 0, 0.08) * 3);
    const glR = 70 + bp * 110;
    const eg = ctx.createRadialGradient(fc2.x, fc2.y, 4, fc2.x, fc2.y, glR);
    eg.addColorStop(0, `rgba(255,175,55,${fi * flicker * 0.22})`);
    eg.addColorStop(0.35, `rgba(255,100,18,${fi * flicker * 0.09})`);
    eg.addColorStop(1, 'rgba(255,60,5,0)');
    ctx.fillStyle = eg;
    ctx.fillRect(fc2.x - glR, fc2.y - glR * 1.6, glR * 2, glR * 2.8);
  }
}

function loop(ts) {
  const dt = lastT ? Math.min((ts - lastT) / 1000, 0.05) : 1 / 60;
  lastT = ts;
  const { bp, fi } = update(dt);
  render(bp, fi);
  requestAnimationFrame(loop);
}

// ============================================================
//  INIT
// ============================================================
function init() {
  // One-time renders
  drawDeskOnce();
  drawEnvelope();
  buildBurnTimeMap();

  // Copy clean envelope to work canvas for initial display
  workCtx.clearRect(0, 0, ENV_W, ENV_H);
  workCtx.drawImage(envCanvas, 0, 0);

  // Render first frame (static, no fire yet)
  ctx.drawImage(deskCanvas, 0, 0);
  drawEnvelopeShadow();
  ctx.save();
  ctx.translate(ENV_CX, ENV_CY);
  ctx.rotate(ENV_ANGLE);
  ctx.translate(-ENV_W / 2, -ENV_H / 2);
  ctx.drawImage(workCanvas, 0, 0);
  ctx.restore();

  requestAnimationFrame(loop);
}

init();
</script>
</body>
