name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test CLI bundle
        run: pnpm -C apps/lmcode run smoke

  test:
    runs-on: ${{ matrix.os }}

    # Both OS legs are required. The Windows surface has been hardened
    # (path-separator normalization via pathe, CRLF-tolerant snapshots, sqlite
    # file-handle cleanup, win32-skips for genuinely POSIX-only tests). Hook and
    # shell tests rely on bash, which the GitHub windows-latest runner provides
    # via Git for Windows on PATH.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: pnpm run test
      - name: Smoke test CLI development entry
        run: pnpm -C apps/lmcode run dev -- --version

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: pnpm run lint
      - run: pnpm run sherif

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
