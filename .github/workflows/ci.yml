name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Smoke test CLI bundle
        run: pnpm -C apps/lmcode run smoke

  test:
    runs-on: ${{ matrix.os }}

    # The Windows leg is informational for now: a number of suites have
    # pre-existing Windows-only failures (sqlite file-handle cleanup, symlink
    # privileges, POSIX file-mode and path-separator assertions, CRLF snapshots).
    # Keep it visible without blocking the pipeline until that surface is hardened.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: pnpm run test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: pnpm run lint
      - run: pnpm run sherif

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - name: Typecheck
        run: |
          pnpm dlx --package @typescript/native-preview@beta tsgo --version
          for config in packages/*/tsconfig.json apps/lmcode/tsconfig.json; do
            echo "Typechecking ${config}"
            pnpm dlx --package @typescript/native-preview@beta tsgo -p "${config}" --noEmit
          done
