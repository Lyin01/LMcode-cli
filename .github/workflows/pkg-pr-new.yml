name: pkg.pr.new

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish LMcode preview
    runs-on: ubuntu-latest
    # Opt-in. Publishing requires the pkg-pr-new GitHub App to be installed on
    # the repo (https://github.com/apps/pkg-pr-new); without it the publish step
    # 404s and fails every PR. Kept off by default so it doesn't block PRs.
    # To enable: install the App, then set repo variable ENABLE_PR_PREVIEW=true.
    if: >-
      github.repository_owner == 'Lyin01' &&
      github.event.pull_request.draft == false &&
      vars.ENABLE_PR_PREVIEW == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package dependencies
        run: pnpm run build:packages

      - name: Generate LMcode built-in catalog
        shell: bash
        run: |
          CATALOG_FILE="$RUNNER_TEMP/lmcode-built-in-catalog.json"
          node apps/lmcode/scripts/update-catalog.mjs --out "$CATALOG_FILE"
          echo "LMCODE_BUILT_IN_CATALOG_FILE=$CATALOG_FILE" >> "$GITHUB_ENV"

      - name: Build LMcode package
        run: pnpm --filter @lmcode-cli/lmcode run build

      - name: Publish pkg.pr.new preview
        run: pnpm exec pkg-pr-new publish --bin --commentWithSha --packageManager=pnpm,npm --no-template './apps/lmcode'
